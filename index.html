<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GovWell — Territory Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Design tokens ───────────────────────────────────────── */
:root {
  --bg:          #f0f2f5;
  --surface:     #ffffff;
  --surface-2:   #f6f6f6;
  --surface-3:   #eeeeee;
  --border:      #e0e0e0;
  --border-sub:  #ebebeb;
  --text:        #111111;
  --text-muted:  #5e5e5e;
  --text-faint:  #aaaaaa;
  --map-bg:      #dde3ea;
  --ctrl-bg:     rgba(255,255,255,0.96);
  --ctrl-border: #d4d4d4;
  --ctrl-hover:  rgba(0,0,0,0.05);
  --tt-bg:       rgba(250,250,250,0.98);
  --tt-border:   #e0e0e0;
  --tt-text:     #111111;
  --tt-val:      #0a0a0a;
  --tt-row-bdr:  rgba(0,0,0,0.07);
  --scroll:      #cccccc;
  --state-stroke:#bbbbbb;
}
html.dark {
  --bg:          #0d0d0d;
  --surface:     #161616;
  --surface-2:   #1d1d1d;
  --surface-3:   #252525;
  --border:      #303030;
  --border-sub:  #272727;
  --text:        #f0f4f8;
  --text-muted:  #a0aab4;
  --text-faint:  #606874;
  --map-bg:      #111318;
  --ctrl-bg:     rgba(20,20,22,0.97);
  --ctrl-border: #383838;
  --ctrl-hover:  rgba(255,255,255,0.09);
  --tt-bg:       rgba(20,20,22,0.98);
  --tt-border:   #3d3d3d;
  --tt-text:     #ffffff;
  --tt-val:      #f0f4f8;
  --tt-row-bdr:  rgba(255,255,255,0.10);
  --scroll:      #3a3a3a;
  --state-stroke:#2a2a2a;
}

body{font-family:'DM Sans','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header (always dark) ────────────────────────────────── */
#header{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:46px;background:#0a0a0a;border-bottom:1px solid #222;flex-shrink:0;gap:10px}
.header-logo{height:18px;width:auto;flex-shrink:0}
.header-divider{width:1px;height:14px;background:rgba(255,255,255,0.12);margin:0 2px}
.subtitle{font-size:10px;color:#555;white-space:nowrap;padding-left:10px;border-left:1px solid #2a2a2a}
.date-chip{font-size:9px;padding:2px 7px;border-radius:10px;background:#1a1a1a;border:1px solid #333;color:#888;white-space:nowrap}
.header-left{display:flex;align-items:center;gap:10px}
.header-right{display:flex;align-items:center;gap:6px;min-width:0}
.theme-toggle{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:border-color .15s,color .15s,background .15s;flex-shrink:0}
.theme-toggle:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06)}
.icon-sun{display:none}
.icon-moon{display:block}
html.dark .icon-sun{display:block}
html.dark .icon-moon{display:none}


/* ── Body ───────────────────────────────────────────────── */
#body{display:flex;flex:1;overflow:hidden;min-height:0}
#mapWrap{flex:1;position:relative;overflow:hidden;background:var(--map-bg);min-height:400px}
#map{position:absolute;inset:0;width:100%;height:100%;background:var(--map-bg)}
#mapStatus{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-muted);font-size:13px;z-index:999;text-align:center;padding:20px;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:10px;display:none}
#mapStatus.visible{display:block}
#mapStatus .status-title{color:#fbbf24;font-weight:700;margin-bottom:8px;font-size:14px}
#mapStatus .status-detail{color:var(--text-faint);font-size:11px;line-height:1.5;margin-top:6px;font-family:ui-monospace,monospace}

/* Leaflet UI */
html.dark .leaflet-tile-pane{filter:brightness(1.35)}
.leaflet-control-attribution{background:var(--ctrl-bg) !important;color:var(--text-faint) !important;font-size:9px !important;border-radius:6px 0 0 0 !important;padding:2px 6px !important}
.leaflet-control-attribution a{color:var(--text-muted) !important}
.leaflet-bar{border:1px solid var(--ctrl-border) !important;box-shadow:0 2px 10px rgba(0,0,0,.15) !important}
.leaflet-bar a{background:var(--surface) !important;color:var(--text) !important;border-bottom-color:var(--border) !important;font-weight:600 !important}
.leaflet-bar a:hover{background:var(--surface-2) !important;color:var(--text) !important}

/* ── State boundaries (overlay) ─────────────────────────── */
.state-path{stroke:var(--state-stroke);stroke-width:0.8;cursor:pointer;transition:filter .12s}
.state-path:hover{filter:brightness(1.7)}
.state-path.selected{stroke:#fff !important;stroke-width:1.5 !important;filter:brightness(1.3)}

/* ── Dots ───────────────────────────────────────────────── */
.dots-overlay{position:absolute;pointer-events:none;will-change:transform}
.dots-overlay path.dot{pointer-events:auto;cursor:pointer;transition:filter .1s}
.dots-overlay path.dot:hover{filter:brightness(1.6) drop-shadow(0 0 4px white)}
.dots-overlay text.dot-label{font-family:'DM Sans',sans-serif;font-size:10px;pointer-events:none;dominant-baseline:middle;paint-order:stroke;stroke:rgba(0,0,0,.75);stroke-width:2px;stroke-linejoin:round}

/* ── Map controls column (top-left overlay) ─────────────── */
#mapControls{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:6px}

/* ── Visibility panel ───────────────────────────────────── */
#visibilityPanel{background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:10px;padding:10px 12px;min-width:165px;box-shadow:0 4px 16px rgba(0,0,0,.12)}

/* ── Show table bar ─────────────────────────────────────── */
#showTableBar{border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.stb-btn{width:100%;padding:9px 14px;font-size:12px;font-weight:700;font-family:inherit;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;color:var(--text-muted);cursor:pointer;text-align:left;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
.stb-btn:hover{color:var(--text);border-color:var(--text-muted);background:var(--surface-2)}
.stb-btn.active{background:rgba(254,175,14,0.1);border-color:#FEAF0E;color:#FEAF0E}
.vp-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:700;margin-bottom:8px}
.vp-btn{width:100%;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--ctrl-border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600;text-align:left;transition:all .12s;margin-bottom:6px;display:block}
.vp-btn:hover{color:var(--text);background:var(--ctrl-hover)}
.vp-btn.active{background:var(--surface-3);color:var(--text);border-color:var(--text-muted)}
.vp-divider{height:1px;background:var(--border);margin-bottom:6px}
#vp-state-wrap{position:relative}
.vp-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--ctrl-border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:500;transition:all .12s}
.vp-trigger:hover{color:var(--text);background:var(--ctrl-hover)}
.vp-trigger.open{border-color:var(--text-muted);color:var(--text)}
.vp-chevron{width:9px;height:9px;flex-shrink:0;transition:transform .15s;opacity:.5}
.vp-trigger.open .vp-chevron{transform:rotate(180deg);opacity:1}
.vp-dropdown{position:fixed;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:1010;overflow:hidden;display:none;width:210px}
.vp-dropdown.open{display:block}
.vp-search{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:7px 10px;font-size:11px;font-family:inherit;outline:none}
.vp-search::placeholder{color:var(--text-faint)}
.vp-list{max-height:220px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--scroll) transparent}
.vp-list::-webkit-scrollbar{width:3px}
.vp-list::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.vp-item{display:flex;align-items:center;gap:7px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--text-muted);transition:background .08s;user-select:none}
.vp-item:hover{background:var(--ctrl-hover);color:var(--text)}
.vp-item.selected{color:var(--text);background:rgba(254,175,14,0.07)}
.vp-check{width:12px;height:12px;border-radius:3px;border:1px solid var(--ctrl-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s}
.vp-item.selected .vp-check{background:#FEAF0E;border-color:#FEAF0E}
.vp-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#vp-clear{display:none;width:100%;margin-top:6px;padding:4px 0;font-size:10px;font-weight:600;font-family:inherit;color:var(--text-faint);background:transparent;border:none;cursor:pointer;text-align:center;transition:color .12s}
#vp-clear:hover{color:#ef4444}
#vp-clear.visible{display:block}


/* ── Tooltip ────────────────────────────────────────────── */
#tooltip{position:fixed;background:var(--tt-bg);border:1px solid var(--tt-border);border-radius:10px;padding:11px 14px;font-size:11px;pointer-events:none;display:none;z-index:2000;max-width:240px;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.gw-dot-icon{cursor:pointer}
.dot-pulse-ring{width:32px;height:32px;border-radius:50%;border:2.5px solid #ffffff;box-shadow:0 0 0 2px rgba(0,0,0,0.4);animation:dot-pulse 0.9s ease-out 2 forwards;opacity:0;pointer-events:none}
@keyframes dot-pulse{0%{transform:scale(0.4);opacity:1}100%{transform:scale(2.2);opacity:0}}
.gw-dot-icon svg{overflow:visible}
.tt-name{font-weight:700;color:var(--tt-text);margin-bottom:7px;font-size:12px;line-height:1.3}
.tt-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:2.5px 0;border-bottom:1px solid var(--tt-row-bdr);font-size:10.5px;color:var(--text-muted)}
.tt-row:last-child{border-bottom:none}
.tt-val{color:var(--tt-val);font-weight:600;text-align:right;max-width:150px}
.tt-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:8px;font-size:9.5px;font-weight:700}
.tt-new{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;background:rgba(254,175,14,0.12);border:1px solid rgba(254,175,14,0.35);color:#FEAF0E}

#stateTip{position:fixed;background:var(--tt-bg);border:1px solid var(--tt-border);border-radius:8px;padding:9px 12px;font-size:11px;pointer-events:none;display:none;z-index:1500;min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.12)}


/* ── BDM Pages bar ──────────────────────────────────────── */
#bdmPagesBar{background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;padding:0;box-shadow:0 4px 16px rgba(0,0,0,.12);overflow:visible;position:relative}
#bdmPagesDropdown{display:none;position:absolute;top:calc(100% + 3px);left:0;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:1010;min-width:165px;overflow:hidden}
#bdmPagesDropdown.open{display:block}
.bdm-rep-link{display:block;padding:6px 12px;font-size:11px;color:var(--text-muted);text-decoration:none;transition:background .08s,color .08s;white-space:nowrap;font-weight:500}
.bdm-rep-link:hover{background:var(--ctrl-hover);color:var(--text)}

/* ── Status hot bar ─────────────────────────────────────── */
#hotbar-container{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;align-items:center;gap:5px;white-space:nowrap}
#status-hotbar,#pipeline-subbar,#pop-hotbar,#activity-hotbar{display:flex;align-items:center;gap:2px;background:rgba(8,8,8,0.82);border:1px solid rgba(255,255,255,0.11);border-radius:999px;padding:3px;backdrop-filter:blur(10px);box-shadow:0 4px 24px rgba(0,0,0,.5)}
html:not(.dark) #status-hotbar,html:not(.dark) #pipeline-subbar,html:not(.dark) #pop-hotbar,html:not(.dark) #activity-hotbar{background:rgba(255,255,255,0.92);border-color:rgba(0,0,0,0.12);box-shadow:0 4px 20px rgba(0,0,0,.15)}
#pipeline-subbar{display:none}
#pipeline-subbar.open{display:flex}
#pop-hotbar{gap:3px}
.hotbar-sep{width:1px;height:16px;background:rgba(255,255,255,0.15);margin:0 2px;flex-shrink:0}
html:not(.dark) .hotbar-sep{background:rgba(0,0,0,0.12)}
.shb-sub{font-size:8px;opacity:.55;font-weight:400;margin-left:1px}
.shb-range-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);padding:0 2px;user-select:none}
html:not(.dark) .shb-range-lbl{color:rgba(0,0,0,0.35)}
.shb-input{width:58px;font-size:10px;font-family:inherit;padding:3px 7px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.75);outline:none;transition:border-color .12s}
.shb-input:focus{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.95)}
.shb-input::placeholder{color:rgba(255,255,255,0.25)}
.shb-input.has-val{border-color:#FEAF0E;color:#FEAF0E}
html:not(.dark) .shb-input{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.18);color:rgba(0,0,0,0.7)}
html:not(.dark) .shb-input:focus{border-color:rgba(0,0,0,0.4);color:rgba(0,0,0,0.9)}
html:not(.dark) .shb-input::placeholder{color:rgba(0,0,0,0.25)}
html:not(.dark) .shb-input.has-val{border-color:#FEAF0E;color:#c87c00}
.shb-btn{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:999px;border:none;background:transparent;color:rgba(255,255,255,0.45);cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;white-space:nowrap;transition:all .15s;line-height:1}
html:not(.dark) .shb-btn{color:rgba(0,0,0,0.45)}
.shb-btn:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.08)}
html:not(.dark) .shb-btn:hover{color:rgba(0,0,0,0.8);background:rgba(0,0,0,0.06)}
.shb-btn.active{background:rgba(255,255,255,0.13);color:var(--shb-color,rgba(255,255,255,0.95))}
html:not(.dark) .shb-btn.active{background:rgba(0,0,0,0.08);color:var(--shb-color,rgba(0,0,0,0.85))}
#pipeline-subbar .shb-btn{font-size:10px;padding:4px 12px}

/* ── Rep relationship filter bar ────────────────────────── */
#repFilterBar{display:none;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:10px;padding:10px 12px;min-width:165px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.rf-btn{width:100%;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--ctrl-border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;font-weight:600;text-align:left;transition:all .12s;margin-bottom:6px;display:block}
.rf-btn:last-child{margin-bottom:0}
.rf-btn:hover{color:var(--text);background:var(--ctrl-hover)}
.rf-btn.active.owned{background:rgba(254,175,14,0.12);border-color:#FEAF0E;color:#FEAF0E}
.rf-btn.active.calledin{background:rgba(56,189,248,0.12);border-color:#38bdf8;color:#38bdf8}

/* ── Header dropdowns (position:fixed, placed via JS below trigger) */
#vp-rep-dropdown,#state-dash-dropdown{position:fixed;background:#161616;border:1px solid rgba(255,255,255,0.12);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:9999;overflow:hidden;display:none;width:220px}
#vp-rep-dropdown.open,#state-dash-dropdown.open{display:block}
/* ── Competitor dropdown (anchored to hotbar-container) */
#comp-dropdown{position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#161616;border:1px solid rgba(255,255,255,0.12);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:1010;overflow:hidden;display:none;width:260px}
#comp-dropdown.open{display:block}

/* ── Header team controls ────────────────────────────────── */
#teamControls{display:flex;align-items:center;gap:3px}
.team-hdr-btn{font-size:11px;font-weight:600;font-family:inherit;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .12s;white-space:nowrap}
.team-hdr-btn:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06)}
.team-hdr-btn.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);color:#fff}

/* Dashboard button in header */
#header-dash-btn{display:none;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:inherit;color:#000;background:#FEAF0E;border:none;border-radius:999px;padding:4px 12px;cursor:pointer;text-decoration:none;transition:background .12s;white-space:nowrap;flex-shrink:0}
#header-dash-btn:hover{background:#fbbf24}
#header-dash-btn.visible{display:inline-flex}

/* ── Color mode panel ───────────────────────────────────── */
#colorModePanel{background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:10px;padding:10px 12px;min-width:165px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.cm-pill{font-size:10px;font-weight:700;font-family:inherit;padding:3px 9px;border-radius:20px;border:1px solid var(--ctrl-border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap}
.cm-pill:hover{border-color:var(--text-muted);color:var(--text)}
.cm-pill.active{background:#FEAF0E;border-color:#FEAF0E;color:#000}

/* ── Owner / Pod legend ─────────────────────────────────── */
#ownerLegend{position:absolute;bottom:52px;right:10px;z-index:1000;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:10px;padding:10px 12px;box-shadow:0 4px 16px rgba(0,0,0,.2);min-width:160px;max-height:calc(100vh - 120px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--scroll) transparent}
.leg-section{margin-bottom:8px}
.leg-section:last-child{margin-bottom:0}
.leg-section-title{font-size:9px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;color:var(--text-faint);margin-bottom:5px}
.leg-row{display:flex;align-items:center;gap:7px;padding:2px 0;font-size:11px;color:var(--text-muted)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-name{white-space:nowrap}

/* ── Table panel (left third) ───────────────────────────── */
#tablePanel{width:42%;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .2s ease}
#tablePanel.hidden{width:0;border-right:none}
#tablePanel.hidden *{visibility:hidden}
#tableHead{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface-2)}
.table-head-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:700}
#tableCount{font-size:11px;font-weight:700;color:var(--text)}
#tableWrap{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--scroll) transparent}
#tableWrap::-webkit-scrollbar{width:3px}
#tableWrap::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
#accountTable{width:100%;border-collapse:collapse;font-size:11px}
#accountTable thead{position:sticky;top:0;z-index:2;background:var(--surface-2)}
#accountTable th{padding:6px 8px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-faint);border-bottom:1px solid var(--border);white-space:nowrap}
#accountTable td{padding:5px 8px;border-bottom:1px solid var(--border-sub);color:var(--text-muted);vertical-align:middle}
#accountTable tbody tr[data-id]{cursor:pointer}
#accountTable tbody tr:hover td{background:var(--ctrl-hover);color:var(--text)}
#accountTable tr.act-detail:hover td{background:var(--surface-2) !important}
#accountTable th.sortable{cursor:pointer;user-select:none}
#accountTable th.sortable:hover{color:var(--text)}
#accountTable th.sorted-asc::after{content:' \2191';color:#FEAF0E}
#accountTable th.sorted-desc::after{content:' \2193';color:#FEAF0E}
.col-name{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:var(--text) !important}
.col-st{width:26px;color:var(--text-faint) !important;font-weight:600;font-size:10px}
.col-owner{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-tier{width:30px;text-align:center}
.col-pop{width:55px;text-align:right;font-variant-numeric:tabular-nums}
.col-calls{width:36px;text-align:right;font-variant-numeric:tabular-nums}
.col-last{width:60px;white-space:nowrap;font-size:10px}
.col-exp{width:18px;padding:0 3px !important;text-align:center}
.col-stage{width:72px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-competitor{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:var(--text-muted)}
.st-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle}
.st-star{font-size:11px;line-height:1;vertical-align:middle}
.tier-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}
.exp-btn{background:transparent;border:none;cursor:pointer;color:var(--text-faint);font-size:9px;padding:2px 4px;border-radius:3px;transition:color .1s,transform .15s;line-height:1}
.exp-btn:hover{color:var(--text)}
.exp-btn.open{transform:rotate(90deg);color:#FEAF0E}
.act-detail td{background:var(--surface-2) !important;padding:8px 12px !important}
.rep-breakdown{display:flex;flex-wrap:wrap;gap:5px}
.rep-chip{font-size:10px;padding:2px 8px;border-radius:12px;background:var(--surface-3);border:1px solid var(--border);color:var(--text-muted);white-space:nowrap}
.rep-chip strong{color:var(--text);font-weight:600}
.rep-back-link{font-size:10px;color:#555;text-decoration:none;padding:3px 8px;border:1px solid #2a2a2a;border-radius:5px;white-space:nowrap;transition:color .12s,border-color .12s}
.rep-back-link:hover{color:#aaa;border-color:#444}
#clearFiltersBtn{font-size:11px;font-weight:700;font-family:inherit;color:#fff;background:#dc2626;border:none;border-radius:6px;padding:5px 13px;cursor:pointer;white-space:nowrap;transition:background .12s,opacity .12s,box-shadow .12s;opacity:0.28;pointer-events:none}
#clearFiltersBtn.active{opacity:1;pointer-events:auto;box-shadow:0 0 0 2px rgba(220,38,38,0.35)}
#clearFiltersBtn.active:hover{background:#ef4444}
.dash-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;font-family:inherit;color:#000;background:#FEAF0E;border:none;border-radius:6px;padding:5px 13px;text-decoration:none;white-space:nowrap;cursor:pointer;transition:background .12s,transform .1s;flex-shrink:0}
.dash-btn:hover{background:#fbbf24;transform:translateY(-1px)}
.dash-divider{width:1px;height:18px;background:rgba(255,255,255,0.15);margin:0 2px;flex-shrink:0}
.rep-mode-chip{font-size:9px;padding:2px 8px;border-radius:10px;background:#1a1a1a;border:1px solid #333;color:#aaa;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.table-section-hdr td{padding:6px 10px !important;border-top:2px solid var(--border) !important;border-bottom:1px solid var(--border) !important;border-left:3px solid transparent}
.table-section-hdr.owned  td{background:rgba(254,175,14,0.07) !important;border-left-color:#FEAF0E !important}
.table-section-hdr.calledin td{background:rgba(56,189,248,0.07) !important;border-left-color:#38bdf8 !important}
.tsh-label{font-size:9px;text-transform:uppercase;letter-spacing:.7px;font-weight:700;color:var(--text-muted)}
.tsh-count{font-size:10px;font-weight:700;color:var(--text-faint);margin-left:8px}

/* ── Table pagination bar ────────────────────────────────── */
#tablePager{display:none;align-items:center;justify-content:space-between;padding:5px 10px;border-top:1px solid var(--border);background:var(--surface-2);flex-shrink:0}
.pg-btn{background:transparent;border:1px solid var(--ctrl-border);border-radius:5px;color:var(--text-muted);cursor:pointer;font-family:inherit;font-size:14px;line-height:1;padding:1px 8px;transition:all .12s}
.pg-btn:hover:not(:disabled){color:var(--text);border-color:var(--text-muted)}
.pg-btn:disabled{opacity:.3;cursor:default}
#pagerInfo{font-size:10px;color:var(--text-faint);font-weight:600}
.act-expand{display:flex;flex-direction:row;align-items:flex-start;gap:16px;padding:2px 0}
.act-expand-main{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.act-tools{display:flex;flex-direction:column;gap:5px;flex-shrink:0;align-items:flex-end}
.act-tool-link{display:inline-flex;align-items:center;text-decoration:none;opacity:0.75;transition:opacity .15s}
.act-tool-link:hover{opacity:1}
.act-tool-link img{display:block;width:auto}
.act-tool-link.sf{padding:0}
.act-tool-link.sf img{height:20px}
.act-tool-link.sb{background:#fff;border-radius:5px;padding:2px 7px}
.act-tool-link.sb img{height:16px}
.act-block-label{font-size:8px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:700;margin-bottom:4px}
.contact-group{margin-bottom:6px}
.contact-group-head{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.contact-group-count{font-weight:400;color:var(--text-faint)}
.contact-row{display:flex;align-items:baseline;gap:6px;font-size:10px;padding:2px 0;border-bottom:1px solid var(--border-sub)}
.contact-row:last-child{border-bottom:none}
.contact-name{font-weight:600;color:var(--text);min-width:120px}
.contact-title{color:var(--text-muted);flex:1}
.contact-last{color:var(--text-faint);font-size:9px;white-space:nowrap}

/* ── Basemap style toggle — bottom-left, beside zoom controls ─────── */
#basemapToggle{position:absolute;bottom:10px;left:46px;display:flex;gap:3px;z-index:1000;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;padding:3px}

/* ── Last-refreshed chip (bottom-left, above basemap toggle) ─────── */
#refreshedChip{position:absolute;bottom:48px;left:46px;z-index:1000;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;padding:4px 10px;font-size:9px;color:var(--text-muted);letter-spacing:.2px;white-space:nowrap;pointer-events:none}
#refreshedChip .rc-lbl{color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;font-size:8px;margin-right:4px}
#refreshedChip .rc-val{color:var(--text);font-weight:600}
/* ── Search box — bottom-left, above refreshed chip, dropdown opens upward ── */
#searchBox{position:absolute;bottom:82px;left:46px;z-index:1100;width:260px}
#searchInput{width:100%;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;padding:7px 11px 7px 28px;font-size:11px;color:var(--text);font-family:inherit;outline:none;transition:border-color .12s;box-shadow:0 4px 16px rgba(0,0,0,.08)}
#searchInput::placeholder{color:var(--text-faint)}
#searchInput:focus{border-color:#60a5fa}
#searchBox::before{content:"⌕";position:absolute;left:9px;top:7px;color:var(--text-faint);font-size:14px;pointer-events:none}
#searchResults{display:none;position:absolute;bottom:100%;left:0;right:0;margin-bottom:4px;background:var(--ctrl-bg);border:1px solid var(--ctrl-border);border-radius:8px;overflow:hidden;max-height:280px;overflow-y:auto;box-shadow:0 -8px 28px rgba(0,0,0,.12)}
#searchResults.visible{display:block}
#searchResults::-webkit-scrollbar{width:4px}
#searchResults::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px}
.sr-row{padding:7px 11px;border-bottom:1px solid var(--border-sub);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;transition:background .08s}
.sr-row:last-child{border-bottom:none}
.sr-row:hover,.sr-row.focus{background:rgba(96,165,250,.12)}
.sr-name{font-size:11px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sr-meta{font-size:9px;color:var(--text-muted);display:flex;gap:5px;align-items:center;flex-shrink:0}
.sr-st{padding:1px 5px;border-radius:7px;font-size:8px;font-weight:700}
.sr-empty{padding:10px 12px;color:var(--text-faint);font-size:10px;text-align:center;font-style:italic}
.sr-hint{padding:8px 11px;color:var(--text-faint);font-size:9px;border-top:1px solid var(--border-sub);background:var(--surface-2)}

.bm-btn{font-size:9px;padding:4px 9px;border-radius:5px;border:none;cursor:pointer;font-weight:700;font-family:inherit;color:var(--text-muted);background:transparent;transition:all .12s;text-transform:uppercase;letter-spacing:.4px}
.bm-btn:hover{color:var(--text)}
.bm-btn.active{background:#1e3a5f;color:#bfdbfe}

</style>
</head>

<div id="body">

  <div id="tablePanel" class="hidden">
    <div id="tableHead">
      <span class="table-head-label">Accounts &nbsp;<span id="tableCount"></span></span>
    </div>
    <div id="tableWrap">
      <table id="accountTable">
        <thead>
          <tr>
            <th class="col-exp"></th>
            <th class="col-name sortable" data-sort="name">Account</th>
            <th class="col-st sortable"   data-sort="st">St</th>
            <th class="col-owner sortable" data-sort="owner">Owner</th>
            <th class="col-stage sortable" data-sort="stage">Stage</th>
            <th class="col-tier sortable" data-sort="tier">Tier</th>
            <th class="col-pop sortable"  data-sort="pop">Pop</th>
            <th class="col-calls sortable" data-sort="calls">Calls</th>
            <th class="col-last sortable" data-sort="last">Last Call</th>
            <th class="col-competitor sortable" data-sort="competitor">Competitor</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="tablePager">
      <button class="pg-btn" id="pagerPrev" onclick="prevPage()">&#8249;</button>
      <span id="pagerInfo"></span>
      <button class="pg-btn" id="pagerNext" onclick="nextPage()">&#8250;</button>
    </div>
  </div>

  <div id="mapWrap">
    <div id="map"></div>

    <div id="hotbar-container">
      <div id="status-hotbar">
        <button class="shb-btn active" data-code="all">All</button>
        <button class="shb-btn" data-code="cu"       style="--shb-color:#fbbf24">&#9733; Customers</button>
        <button class="shb-btn" data-code="pipeline" style="--shb-color:#f97316">&#9670; Pipeline</button>
        <button class="shb-btn" data-code="t"        style="--shb-color:#38bdf8">&#9679; Touched</button>
        <button class="shb-btn" data-code="u"        style="--shb-color:#94a3b8">&#9675; Untouched</button>
      </div>
      <div id="pipeline-subbar">
        <button class="shb-btn active" data-pipe="all">All</button>
        <button class="shb-btn" data-pipe="mf"   style="--shb-color:#f97316">&#9679; Mid Funnel</button>
        <button class="shb-btn" data-pipe="tf"   style="--shb-color:#3b82f6">&#9679; Top Funnel</button>
        <button class="shb-btn" data-pipe="lost" style="--shb-color:#ef4444">&#9679; Lost</button>
      </div>
      <div id="pop-hotbar">
        <button class="shb-btn" data-pop="s" style="--shb-color:#fbbf24">Tier S<span class="shb-sub">≥50k</span></button>
        <button class="shb-btn" data-pop="1" style="--shb-color:#4ade80">T1<span class="shb-sub">25–50k</span></button>
        <button class="shb-btn" data-pop="2" style="--shb-color:#60a5fa">T2<span class="shb-sub">10–25k</span></button>
        <button class="shb-btn" data-pop="3" style="--shb-color:#94a3b8">T3<span class="shb-sub">&lt;10k</span></button>
        <div class="hotbar-sep"></div>
        <span class="shb-range-lbl">&gt;</span>
        <input class="shb-input" id="pop-min" type="number" min="0" placeholder="min pop">
        <span class="shb-range-lbl">&lt;</span>
        <input class="shb-input" id="pop-max" type="number" min="0" placeholder="max pop">
      </div>
      <div id="activity-hotbar">
        <button class="shb-btn" data-act="30d"   style="--shb-color:#38bdf8">Last Month</button>
        <button class="shb-btn" data-act="90d"   style="--shb-color:#38bdf8">Last Quarter</button>
        <button class="shb-btn" data-act="1y"    style="--shb-color:#38bdf8">Last Year</button>
        <button class="shb-btn" data-act="never" style="--shb-color:#94a3b8">1Yr+ / Never</button>
        <div class="hotbar-sep"></div>

const _TIER_SORT = { 'S': 0, '1': 1, '2': 2, '3': 3 };

function _sortAccounts(arr, col, dir){
  return [...arr].sort((a, b) => {
    let va, vb, cmp;
    switch(col){
      case 'name':  return dir * (a.a || '').localeCompare(b.a || '');
      case 'st':    return dir * (a.s || '').localeCompare(b.s || '');
      case 'owner': return dir * (a.o || '').localeCompare(b.o || '');
      case 'tier':
        va = _TIER_SORT[a.t] ?? 99; vb = _TIER_SORT[b.t] ?? 99;
        return dir * (va - vb);
      case 'pop':
        if(a.pop == null && b.pop == null) return 0;
        if(a.pop == null) return 1; if(b.pop == null) return -1;
        return dir * (a.pop - b.pop);
      case 'calls':
        if(a.tc == null && b.tc == null) return 0;
        if(a.tc == null) return 1; if(b.tc == null) return -1;
        return dir * (a.tc - b.tc);
      case 'last':
        if(!a.lcd && !b.lcd) return 0;
        if(!a.lcd) return 1; if(!b.lcd) return -1;
        return dir * a.lcd.localeCompare(b.lcd);
      case 'stage':      return dir * (STATUS_LABELS[a.st]||'').localeCompare(STATUS_LABELS[b.st]||'');
      case 'competitor': return dir * (a.leg||'').localeCompare(b.leg||'');
    }
    return 0;
  });
}

    return [...owned, ...ci];
  }
  return _sortAccounts(all, tableSort.col, tableSort.dir);
}

  wye:d3.symbolWye, cross:d3.symbolCross, circle:d3.symbolCircle,
};
function _applyViewConfig(cfg){
  const codes = Object.keys(cfg.statuses);
  STATUS_COLORS = {}; STATUS_LABELS = {}; SYM_TYPE = {};
  codes.forEach(c => {
    STATUS_COLORS[c] = cfg.statuses[c].color;
    STATUS_LABELS[c] = cfg.statuses[c].label;
    SYM_TYPE[c]      = _D3_SYMBOLS[cfg.statuses[c].symbol] || d3.symbolCircle;
  });
  // Sort by priority descending: highest-priority (cu) first in array.
  // renderDots uses STATUS_ORDER.indexOf() to sort markers — higher index =
  // lower priority = rendered first (underneath).
  STATUS_ORDER  = [...codes].sort((a,b) => cfg.statuses[b].priority - cfg.statuses[a].priority);
  const SHAPED_STROKES = { cu:'#78350f' };
  ICONS = {};

    const s = cfg.statuses[st];
    if(s.symbol && s.symbol !== 'circle'){
      const r = st === 'cu' ? CUST_R : DOT_R;
      ICONS[st] = symbolIcon(st, r, SHAPED_STROKES[st] || '#333', 0);
    }
  });
  SHAPED = new Set(Object.keys(ICONS));
  // Silent fallback for accounts with no pipeline data yet.
  // 'u' is not in view-config (not a meaningful status until activity is layered in)
  // but these accounts still render as a neutral gray dot with no label.
  STATUS_COLORS['u'] = STATUS_COLORS['u'] || '#94a3b8';

}

// ── Leaflet map setup ─────────────────────────────────────────────
const map = L.map('map', {
  center: [39.5, -98.35],
  zoom: 4,
  zoomControl: true,
  preferCanvas: false,
  worldCopyJump: false,
  minZoom: 3,
  maxZoom: 18,
  // Smooth fractional zoom (trackpad pinch / wheel feels continuous)
  zoomSnap: 0,              // fully continuous zoom — no snapping between levels
  zoomDelta: 1,
  scrollWheelZoom: false,   // disabled — replaced by custom smooth handler below
  inertia: true,
  zoomAnimation: true,
  fadeAnimation: true,
});
// Keep +/- buttons visible in bottom-left (basemap toggle is now bottom-left too).
map.zoomControl.setPosition('bottomleft');

// ── Smooth trackpad zoom ───────────────────────────────────────────
// Replaces Leaflet's default wheel handler entirely.
// - goal is tracked independently of map.getZoom() (avoids reading
//   mid-frame state that hasn't settled yet)
// - Persistent RAF loop eases toward goal at 30%/frame (smooth decel)
// - Native addEventListener {passive:false} so preventDefault is respected
// - goal=null between gestures so cursor anchor resets each time
(function(){
  var goal = null, anchor = null, endTimer = null;

  map.getContainer().addEventListener('wheel', function(e) {
    e.preventDefault();
    // Lock cursor position as zoom anchor at start of each gesture
    var r = map.getContainer().getBoundingClientRect();
    anchor = map.containerPointToLatLng(L.point(e.clientX - r.left, e.clientY - r.top));
    // First event of gesture: seed goal from current zoom and clear animations
    if (goal === null) { goal = map.getZoom(); map._stop(); }
    // Normalise delta across modes (trackpad=pixels, mouse=lines, keyboard=pages)
    var raw = e.deltaY;
    if (e.deltaMode === 1) raw *= 20;
    if (e.deltaMode === 2) raw *= 400;
    goal -= raw / 100;   // sensitivity: ~100px raw delta per zoom level; tune here
    goal = Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), goal));
    // After 200ms of silence, signal Leaflet that the gesture is done (loads tiles)
    clearTimeout(endTimer);
    endTimer = setTimeout(function() {
      try { map._moveEnd(true); } catch(_) {}
      goal = null;
    }, 200);
  }, {passive: false});

  // Persistent RAF loop — runs every frame, only acts when a gesture is live
  requestAnimationFrame(function tick() {
    if (goal !== null && anchor !== null) {
      var cur  = map.getZoom();
      var diff = goal - cur;
      if (Math.abs(diff) > 0.001) {
        map.setZoomAround(anchor, cur + diff * 0.3, {animate: false});
      }
    }
    requestAnimationFrame(tick);
  });
})();

// ── Basemap tile layers ───────────────────────────────────────────
// Perf-tuned:
//   keepBuffer: 6         → keep 6 rings of tiles around the viewport, so
//                           pans within that range show instantly (no blanks).
//   updateWhenIdle: true  → only fetch new tiles after the user stops moving.
//   updateWhenZooming:    → skip mid-animation tile fetches.
//   crossOrigin: 'anon'   → let the browser cache tiles across reloads.
//   maxNativeZoom: 18     → scale z=18 tiles for z=19+ instead of 404'ing.
const TILE_OPTS = {
  keepBuffer: 6,
  updateWhenIdle: true,
  updateWhenZooming: false,
  crossOrigin: 'anonymous',
  maxNativeZoom: 18,
  maxZoom: 19,
};
const BASEMAPS = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    ...TILE_OPTS,
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
  }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    ...TILE_OPTS,
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
  }),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    ...TILE_OPTS,
    attribution: 'Tiles © Esri',
  }),
  off: null, // no tile layer — pure dark background + state polygons
};
let activeTile = null;
// NOTE: stateLayer is hoisted here (with `let`) because setBasemap runs
// synchronously at module load — BEFORE the fetch that assigns stateLayer —
// and `let` has a temporal-dead-zone error if referenced before initialization.
let stateLayer = null;
function setBasemap(name){
  currentBasemap = name;
  if(activeTile){ map.removeLayer(activeTile); activeTile = null; }
  if(BASEMAPS[name]){
    activeTile = BASEMAPS[name];
    activeTile.addTo(map);
    activeTile.bringToBack();
  }
  document.querySelectorAll('.bm-btn').forEach(b=>b.classList.toggle('active', b.dataset.bm===name));
  // Invert choropleth fill visibility: on light/sat, states are mostly transparent so tiles show through
  if(stateLayer){
    stateLayer.setStyle(f=>styleForState(f));
  }
}
setBasemap('dark');

function stateColor(){ return '#1e1e1e'; }

function styleForState(f){
  const name = FIPS[String(f.id).padStart(2,'0')];
  const sel = (name && name===currentState);
  const onTiles = currentBasemap !== 'off';
  return {
    color: sel ? '#fff' : '#111',
    weight: sel ? 1.5 : 0.8,
    fillColor: stateColor(name),
    fillOpacity: onTiles ? 0.30 : 1.0,
    className: 'state-path' + (sel?' selected':''),
  };
}

}

// ── Symbol helpers ────────────────────────────────────────────────
function symPath(st,r){
  return d3.symbol().type(SYM_TYPE[st]).size(r*r*Math.PI)();
}
function shortName(name){
  return name
    .replace(/^(City Of|City of|Town Of|Town of|Village Of|Village of|Township Of|Township of|County Of|County of|Borough of|Borough Of)\s+/i,'')
    .replace(/,\s*[A-Z]{2}$/,'').trim();
}

// Build an SVG divIcon with a D3-generated symbol path
function symbolIcon(st, r, strokeColor, strokeWidth){
  const sz = r*2 + 4;
  const path = symPath(st, r);
  const html = `<svg width="${sz}" height="${sz}" viewBox="${-sz/2} ${-sz/2} ${sz} ${sz}" style="overflow:visible"><path d="${path}" fill="${STATUS_COLORS[st]}" fill-opacity="0.92" stroke="${strokeColor||'none'}" stroke-width="${strokeWidth||0}"/></svg>`;
  return L.divIcon({
    html,
    className: 'gw-dot-icon',
    iconSize: [sz, sz],
    iconAnchor: [sz/2, sz/2],
  });
}

// ── Dot rendering via Leaflet-native markers ──────────────────────
// Two renderers: a canvas renderer for the bulk of circle-based dots
// (performance with 16k markers), and SVG marker divIcons for the
// distinctive shape dots (cu, vb, pr, dm, sq, mb, ii — ~2k total).
// Dedicated pane for canvas dots — above overlayPane (400) where the state
// polygons live, below markerPane (600) where the SVG shape markers live.
// Without this, the state polygon layer can steal hover events from circle
// markers sitting underneath it, making the hover card not appear reliably.
map.createPane('dotsPane');
map.getPane('dotsPane').style.zIndex = 450;
map.getPane('dotsPane').style.pointerEvents = 'auto';

const canvasRenderer = L.canvas({ padding: 0.5, pane: 'dotsPane' });
const dotLayer = L.layerGroup().addTo(map);
const custLayer = L.layerGroup().addTo(map);    // customers on top

// Built after view config loads (SYM_TYPE must be populated first)
let ICONS = {};
let SHAPED = new Set();

function filterForView(accts){
  if(visibilityMode === 'none') return [];
  let out = visibilityMode === 'all' ? accts : accts.filter(a => selectedStates.has(a.s));
  if(hotbarActive === 'pipeline'){
    if(selectedPipelineTypes.size === 0){
      out = out.filter(a => a.st === 'mf' || a.st === 'tf' || a.st === 'cl');
    } else {
      out = out.filter(a =>
        (selectedPipelineTypes.has('mf')   && a.st === 'mf') ||
        (selectedPipelineTypes.has('tf')   && a.st === 'tf') ||
        (selectedPipelineTypes.has('lost') && a.st === 'cl')
      );
    }
  } else if(hotbarActive !== 'all'){
    out = out.filter(a => a.st === hotbarActive);
  }
  if(selectedPopTiers.size > 0 || popMin !== null || popMax !== null){
    out = out.filter(a => {
      const p = a.pop;
      if(popMin !== null || popMax !== null){
        if(p == null) return false;
        if(popMin !== null && p < popMin) return false;
        if(popMax !== null && p > popMax) return false;
        return true;
      }
      if(p == null) return false;
      return [...selectedPopTiers].some(t => { const [lo,hi] = POP_TIER_RANGES[t]; return p >= lo && p <= hi; });
    });
  }
  if(repRelFilter) out = out.filter(a => a._rel === repRelFilter);
  if(selectedRep){
    out = out.filter(a => a.o === selectedRep);
  } else if(selectedPod){
    const podMembers = new Set((PODS[selectedPod]||{}).members||[]);
    out = out.filter(a => podMembers.has(a.o));
  }
  if(selectedActivity){
    const opt = ACTIVITY_OPTIONS.find(o => o.id === selectedActivity);
    if(opt) out = out.filter(opt.test);
  }
  if(selectedCompetitors.size > 0){
    out = out.filter(a => a.leg && selectedCompetitors.has(a.leg));
  }
  return out;
}

        return `<div class="tt-row"><span>Functions</span><span class="tt-val" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">${chips}</span></div>`;
      })()
    : '';

  const relRow = d._rel
    ? `<div class="tt-row"><span>Relationship</span><span class="tt-val" style="color:${d._rel==='owned'?'#FEAF0E':'#38bdf8'}">${d._rel==='owned'?'Owned':'Called-In'}</span></div>`
    : '';

  return `
    <div class="tt-name">${d.a}</div>
    ${relRow}${statusRow}
    <div class="tt-row"><span>Tier</span><span class="tt-val">Tier ${d.t}</span></div>
    <div class="tt-row"><span>State</span><span class="tt-val">${d.s||'—'}</span></div>
    ${popRow}${legRow}${arrRow}
    <div class="tt-row"><span>Owner</span><span class="tt-val" style="color:#888">${d.o||'—'}</span></div>
    ${touchedRow}${callsRow}${fnRow}
    <div class="tt-row" style="color:#444;font-size:9px"><span>Click dot to zoom in</span></div>
  `;
}

function getMarkerColor(a){
  if(colorMode === 'owner') return OWNER_COLORS[a.o] || '#94a3b8';
  if(colorMode === 'pod'){
    for(const [name, pod] of Object.entries(PODS)){
      if(pod.members.includes(a.o)) return pod.color;
    }
    return '#94a3b8';
  }
  return STATUS_COLORS[a.st] || '#94a3b8';
}

function buildMarker(a){
  let m;
  const fillColor = getMarkerColor(a);
  const useShape  = colorMode === 'stage' && SHAPED.has(a.st);
  if(useShape){
    m = L.marker([a.la, a.lo], { icon: ICONS[a.st], riseOnHover: true });
  } else {
    const r    = colorMode === 'stage' && a.st === 'cu' ? CUST_R : DOT_R;
    const isCi = a._rel === 'calledin';
    const baseStroke = colorMode === 'stage'
      ? (a.st === 'u' ? '#475569' : a.st === 'cl' ? '#7f1d1d' : 'none')
      : 'none';
    m = L.circleMarker([a.la, a.lo], {
      renderer: canvasRenderer,
      radius: r,
      fillColor: fillColor,
      fillOpacity: colorMode === 'stage' && a.st === 'u' ? 0.75 : 0.88,
      color: isCi ? 'rgba(255,255,255,0.75)' : baseStroke,
      weight: isCi ? 2 : (colorMode === 'stage' && (a.st === 'u' || a.st === 'cl') ? 0.8 : 0),
      bubblingMouseEvents: false,
    });
  }
  // Mouse-following hover tooltip — matches the old pre-Leaflet behavior the
  // user preferred (cursor-tracked, not anchored above the marker).
  m.on('mouseover', (e) => showDotTip(e.originalEvent, a));
  m.on('mousemove', (e) => moveTip(e.originalEvent, tipEl));
  m.on('mouseout',  () => hideDotTip());
  m.on('click',     (e) => { L.DomEvent.stop(e); zoomToDot(a); });
  return m;
}

function renderDots(){
  currentPage = 0;
  dotLayer.clearLayers();
  custLayer.clearLayers();

  let all = ACCOUNTS.filter(a => a.la && a.lo);
  if(currentState) all = all.filter(a => a.s === currentState);
  // No national-level suppression — all statuses render, filter bar does the rest.

  const visible = filterForView(all);

  // Lower priority first, higher on top
  const ordered = [...visible].sort((a,b) =>
    STATUS_ORDER.indexOf(b.st) - STATUS_ORDER.indexOf(a.st)
  );

  ordered.forEach(a => {
    const m = buildMarker(a);
    if(a.st === 'cu') custLayer.addLayer(m);
    else              dotLayer.addLayer(m);
  });
  // Debounce table re-render — dots and table may be triggered together
  clearTimeout(_tableRenderTimer);
  _tableRenderTimer = setTimeout(renderTable, 60);
}

  tipEl.innerHTML=tipHtml(d);

function moveTip(ev,el){
  const mw=window.innerWidth,mh=window.innerHeight,tw=250,th=170;
  el.style.left=(ev.clientX+14+tw>mw?ev.clientX-tw-8:ev.clientX+14)+'px';
  el.style.top =(ev.clientY+th+10>mh?ev.clientY-th-6:ev.clientY+10)+'px';
}

function buildExpandPane(acct){
  if(!acct) return '';
  const sections = [];

  // ── Calls breakdown ──────────────────────────────────────────────
  if(acct.reps && acct.reps.length){
    const chips = acct.reps
      .map(([name, n]) => `<span class="rep-chip"><strong>${name}</strong> · ${n}</span>`)
      .join('');
    sections.push(`
      <div>
        <div class="act-block-label">Call breakdown — ${acct.tc} total</div>
        <div class="rep-breakdown">${chips}</div>
      </div>`);
  }

  // ── Contacts by function ─────────────────────────────────────────
  if(acct.contacts && acct.contacts.length){
    const byFn = {};
    FN_ORDER.forEach(fn => byFn[fn] = []);
    acct.contacts.forEach(c => { if(byFn[c[2]]) byFn[c[2]].push(c); });

    const groups = FN_ORDER
      .filter(fn => byFn[fn].length)
      .map(fn => {
        const rows = byFn[fn].map(([name, title, , last]) => {
          const lastStr = last ? `<span class="contact-last">${fmtLastCall(last)}</span>` : '';
          return `<div class="contact-row">
            <span class="contact-name">${name}</span>
            <span class="contact-title">${title||'—'}</span>
            ${lastStr}
          </div>`;
        }).join('');
        return `<div class="contact-group">
          <div class="contact-group-head">${FN_LABELS[fn]} <span class="contact-group-count">${byFn[fn].length}</span></div>
          ${rows}
        </div>`;
      }).join('');

    sections.push(`
      <div>
        <div class="act-block-label">Contacts</div>
        ${groups}
      </div>`);
  }

  const sfUrl = 'https://govwell.lightning.force.com/lightning/r/Account/' + acct.id + '/view';
  const sbLink = acct.sb
    ? `<a class="act-tool-link sb" href="https://dashboard.starbridge.ai/buyers/${acct.sb}" target="_blank" rel="noopener" title="Open in Starbridge"><img src="sb-logo.jpg" alt="Starbridge"></a>`
    : '';
  const tools = `<div class="act-tools">
    <div class="act-block-label">Tools</div>
    <a class="act-tool-link sf" href="${sfUrl}" target="_blank" rel="noopener" title="Open in Salesforce">
      <img src="sf-logo.png" alt="Salesforce">
    </a>
    ${sbLink}
  </div>`;

  return `<div class="act-expand"><div class="act-expand-main">${sections.join('')}</div>${tools}</div>`;
}

function fmtLastCall(yyyy_mm_dd){
  if(!yyyy_mm_dd) return '—';
  const [y, m, d] = yyyy_mm_dd.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${d}, ${y}`;
}

function toggleTable(){
  tableVisible = !tableVisible;
  document.getElementById('tablePanel').classList.toggle('hidden', !tableVisible);
  const btn = document.getElementById('stbBtn');
  btn.textContent = tableVisible ? 'Hide Table' : 'Show Table';
  btn.classList.toggle('active', tableVisible);
  if(tableVisible){
    // Defer until after the CSS transition (200ms) so the panel animation is smooth
    document.getElementById('tableCount').textContent = '…';
    document.getElementById('tableBody').innerHTML = '';
    clearTimeout(_tableRenderTimer);
    _tableRenderTimer = setTimeout(renderTable, 220);
  }
}

function renderTable(){
  if(!tableVisible) return;
  clearTimeout(_tableRenderTimer);

  const all = filterForView(ACCOUNTS.filter(a => a.la && a.lo));

  // Sort: rep mode keeps owned-first grouping (sort within groups); otherwise flat sort
  if(REP_FILTER && !tableSort.col){
    all.sort((a, b) => {
      if(a._rel === b._rel) return 0;
      return a._rel === 'owned' ? -1 : 1;
    });
  } else if(tableSort.col){
    const sorted = _applyTableSort(all);
    all.splice(0, all.length, ...sorted);
  }

  _updateSortHeaders();
  _totalTablePages = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
  if(currentPage >= _totalTablePages) currentPage = _totalTablePages - 1;

  const start = currentPage * PAGE_SIZE;
  const rows  = all.slice(start, start + PAGE_SIZE);

  document.getElementById('tableCount').textContent = all.length.toLocaleString();

  const pager = document.getElementById('tablePager');
  if(_totalTablePages > 1){
    pager.style.display = 'flex';
    document.getElementById('pagerPrev').disabled = currentPage === 0;
    document.getElementById('pagerNext').disabled = currentPage === _totalTablePages - 1;
    document.getElementById('pagerInfo').textContent = `Page ${currentPage + 1} of ${_totalTablePages}`;
  } else {
    pager.style.display = 'none';
  }

  const tc = TIER_COLORS;
  const rowHtml = a => {
    const tc2    = tc[a.t] || {};
    const hasAct = (a.reps && a.reps.length > 0) || (a.contacts && a.contacts.length > 0);
    const expBtn = hasAct ? `<button class="exp-btn" data-id="${a.id}" title="Show call breakdown">▶</button>` : '';
    const callsCell = a.tc != null ? a.tc : '—';
    const lastCell  = a.lcd ? fmtLastCall(a.lcd) : '—';
    const lastStale = _lcdAge(a.lcd) > _MS_90D;
    const stColor = STATUS_COLORS[a.st] || '#94a3b8';
    const stLabel = STATUS_LABELS[a.st] || '';
    const stageLabel = STATUS_LABELS[a.st] || '—';
    const competitor = a.leg || '—';
    return `<tr data-id="${a.id}"><td class="col-exp">${expBtn}</td><td class="col-name" title="${a.a}">${a.a}</td><td class="col-st">${ABBR[a.s]||''}</td><td class="col-owner" title="${a.o||''}">${a.o||'—'}</td><td class="col-stage" title="${stageLabel}">${stageLabel}</td><td class="col-tier"><span class="tier-badge" style="background:${tc2.bg||'transparent'};color:${tc2.color||'inherit'}">T${a.t}</span></td><td class="col-pop">${a.pop!=null?a.pop.toLocaleString():'—'}</td><td class="col-calls">${callsCell}</td><td class="col-last"${lastStale?' style="color:#ef4444;font-weight:600"':''}>${lastCell}</td><td class="col-competitor" title="${competitor}">${competitor}</td></tr>`;
  };
  const sectionHdr = (label, count, type) =>
    `<tr class="table-section-hdr ${type}"><td colspan="10"><span class="tsh-label">${label}</span><span class="tsh-count">${count.toLocaleString()}</span></td></tr>`;

  let html;
  if(REP_FILTER){
    const totalOwned = all.filter(a => a._rel === 'owned').length;
    const totalCi    = all.filter(a => a._rel === 'calledin').length;
    const ciStart    = totalOwned; // owned are first so ci begins at this index

    html = '';
    if(start === 0 && totalOwned > 0) html += sectionHdr('Owned Accounts', totalOwned, 'owned');
    rows.forEach((a, i) => {
      if((start + i) === ciStart && totalCi > 0) html += sectionHdr('Called-In Accounts', totalCi, 'calledin');
      html += rowHtml(a);
    });
  } else {
    html = rows.map(rowHtml).join('');
  }

  requestAnimationFrame(() => {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = html;
    // Wire expand buttons
    tbody.querySelectorAll('.exp-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id     = btn.dataset.id;
        const tr     = btn.closest('tr');
        const isOpen = btn.classList.contains('open');
        document.querySelectorAll('.act-detail').forEach(d => d.remove());
        document.querySelectorAll('.exp-btn.open').forEach(b => b.classList.remove('open'));
        if(!isOpen){
          btn.classList.add('open');
          const acct = ACCOUNTS.find(a => a.id === id);
          const detail = document.createElement('tr');
          detail.className = 'act-detail';
          detail.innerHTML = `<td colspan="10">${buildExpandPane(acct)}</td>`;
          tr.after(detail);
        }
      });
    });
  });
}

// ── Account search ────────────────────────────────────────────────
// Free-text search over ACCOUNTS[].a. Shows a dropdown of matches with
// state + status; selecting a result flies the map to that account and
// pops the hover tooltip. Ensures the dot is visible (auto-switches to
// "all" if the user hasn't picked a filter yet).
(function setupSearch(){
  const input   = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  const box     = document.getElementById('searchBox');
  if(!input || !results) return;
  let focusIdx  = -1;
  let lastMatches = [];
  const norm = s => (s||'').toLowerCase();

  function render(qRaw){
    const q = norm(qRaw).trim();
    if(!q){ results.classList.remove('visible'); results.innerHTML=''; focusIdx=-1; lastMatches=[]; return; }
    const starts = [], contains = [];
    for(const a of ACCOUNTS){
      const n = norm(a.a);
      if(n.startsWith(q)) starts.push(a);
      else if(n.includes(q)) contains.push(a);
      if(starts.length + contains.length >= 60) break;
    }
    const matches = starts.concat(contains).slice(0, 20);
    lastMatches = matches;
    focusIdx = -1;
    if(!matches.length){
      results.innerHTML = `<div class="sr-empty">No matching accounts</div>`;
      results.classList.add('visible');
      return;
    }
    const rows = matches.map((a,i) => {
      const col = STATUS_COLORS[a.st] || '#888';
      const lbl = (STATUS_LABELS[a.st] || '').split(' ')[0];
      const st  = ABBR[a.s] || '';
      return `<div class="sr-row" data-i="${i}">
        <div class="sr-name">${a.a}</div>
        <div class="sr-meta">
          <span class="sr-st" style="background:${col}22;color:${col}">${lbl}</span>
          <span>${st}</span>
        </div>
      </div>`;
    }).join('');
    results.innerHTML = rows + `<div class="sr-hint">↵ jump · ↑↓ navigate · esc close</div>`;
    results.classList.add('visible');
    [...results.querySelectorAll('.sr-row')].forEach(r=>{
      r.addEventListener('click', () => selectResult(parseInt(r.dataset.i, 10)));
    });
  }

  function selectResult(i){
    const a = lastMatches[i]; if(!a || a.la==null || a.lo==null) return;
    // Ensure the matched account is actually visible on the map.
    if(visibilityMode === 'none') setVisibility('all');
    const targetZ = Math.max(map.getZoom(), 10);
    map.flyTo([a.la, a.lo], targetZ, { duration: 0.7 });
    // Show the hover tooltip at the account's screen position after the
    // fly-to settles (so the projection is accurate).
    map.once('moveend', () => {
      try {
        const pt   = map.latLngToContainerPoint([a.la, a.lo]);
        const rect = map.getContainer().getBoundingClientRect();
        showDotTip({ clientX: rect.left + pt.x, clientY: rect.top + pt.y }, a);
      } catch(err){ /* non-fatal */ }
    });
    results.classList.remove('visible');
    input.value = a.a;
  }

  function debounce(fn, ms){ let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; }
  const renderDeb = debounce(() => render(input.value), 120);
  input.addEventListener('input', renderDeb);
  input.addEventListener('focus', () => { if(input.value.trim()) render(input.value); });
  input.addEventListener('keydown', (e) => {
    const rows = [...results.querySelectorAll('.sr-row')];
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      focusIdx = Math.min(rows.length - 1, focusIdx + 1);
      rows.forEach((r, i) => r.classList.toggle('focus', i === focusIdx));
      if(rows[focusIdx]) rows[focusIdx].scrollIntoView({block:'nearest'});
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      focusIdx = Math.max(0, focusIdx - 1);
      rows.forEach((r, i) => r.classList.toggle('focus', i === focusIdx));
      if(rows[focusIdx]) rows[focusIdx].scrollIntoView({block:'nearest'});
    } else if(e.key === 'Enter'){
      e.preventDefault();
      if(focusIdx < 0 && lastMatches.length) focusIdx = 0;
      if(focusIdx >= 0) selectResult(focusIdx);
    } else if(e.key === 'Escape'){
      results.classList.remove('visible');
      input.blur();
    }
  });
  // Click outside closes the dropdown.
  document.addEventListener('click', (e) => {
    if(!box.contains(e.target)) results.classList.remove('visible');
  });
  // Keyboard shortcut: "/" focuses the search box from anywhere.
  document.addEventListener('keydown', (e) => {
    const tag = (e.target && e.target.tagName) || '';
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    if(e.key === '/'){ e.preventDefault(); input.focus(); input.select(); }
  });
})();

// ── Keyboard + gesture zoom shortcuts ───────────────────────────────
document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === 'Escape'){
    if(e.shiftKey) resetView();
    else           map.zoomOut(1);
    e.preventDefault();
  } else if(e.key === 'Backspace'){
    map.zoomOut(1);
    e.preventDefault();
  }
});

map.on('contextmenu', (e) => {
  const now = Date.now();
  if(now - lastCtxMenu < 500){

    lastCtxMenu = 0;

    lastCtxMenu = now;

});

// ── Table row → map pan + highlight ──────────────────────────────
let _pulseMarker = null;

function highlightDot(acct){
  zoomToDot(acct);

  // Remove any existing pulse marker
  if(_pulseMarker){ map.removeLayer(_pulseMarker); _pulseMarker = null; }
  hideDotTip();

  // Drop a pulsing ring at the dot's location
  _pulseMarker = L.marker([acct.la, acct.lo], {
    icon: L.divIcon({ className:'', html:'<div class="dot-pulse-ring"></div>', iconSize:[32,32], iconAnchor:[16,16] }),
    interactive: false,
    zIndexOffset: 9999,
  }).addTo(map);

  // After the fly animation lands (~650ms), show the tooltip at the dot's screen position
  setTimeout(() => {
    const pt   = map.latLngToContainerPoint([acct.la, acct.lo]);
    const rect = document.getElementById('map').getBoundingClientRect();
    showDotTip({ clientX: rect.left + pt.x, clientY: rect.top + pt.y }, acct);
  }, 680);

  // Clean up after animation completes
  setTimeout(() => {
    if(_pulseMarker){ map.removeLayer(_pulseMarker); _pulseMarker = null; }
  }, 2000);
}

document.getElementById('tableBody').addEventListener('click', e => {
  if(e.target.closest('.exp-btn')) return;
  const tr = e.target.closest('tr[data-id]');
  if(!tr) return;
  const acct = ACCOUNTS.find(a => a.id === tr.dataset.id);
  if(acct) highlightDot(acct);
});

// ── Table header sort ────────────────────────────────────────────
document.querySelectorAll('#accountTable th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if(tableSort.col === col){
      tableSort.dir *= -1;
    } else {
      tableSort.col = col;
      tableSort.dir = 1;
    }
    currentPage = 0;
    _updateSortHeaders();
    renderTable();
  });
});

// We catch the map-level click event (fired by Leaflet when the canvas
// renderer has no marker hit) and hit-test state features via d3.geoContains.
map.on('click', (e) => {
  if(!stateLayer) return;
  const ll = [e.latlng.lng, e.latlng.lat];   // GeoJSON order
  let hitName = null, hitLayer = null;
  stateLayer.eachLayer(l => {
    if(hitName) return;
    if(l.feature && d3.geoContains(l.feature, ll)){
      hitName = FIPS[String(l.feature.id).padStart(2,'0')];
      hitLayer = l;
    }
  });
  // Clicking the already-selected state is a no-op (they're already there);
  // clicking a different state transitions straight to it.
  if(hitName && hitName !== currentState) selectState(hitName);
});
</script>

  <div id="state-dash-list" class="vp-list"></div>
</div>
<div id="vp-rep-dropdown">
  <div id="vp-rep-list" class="vp-list"></div>
</div>
